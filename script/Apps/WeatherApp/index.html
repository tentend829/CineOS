<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wetter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Segoe UI',sans-serif;height:100vh;padding:20px;display:flex;flex-direction:column}
h2{font-size:1rem;color:#888;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
#main{text-align:center;padding:20px 0}
#icon{font-size:4rem;margin-bottom:8px}
#temp{font-size:3rem;font-weight:300}
#feel{font-size:.9rem;color:#888;margin-top:4px}
#desc{font-size:1rem;color:#aaa;margin-top:8px}
#loc{font-size:.8rem;color:#555;margin-top:4px}
.details{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:20px}
.detail{background:#111;border:1px solid #333;border-radius:12px;padding:14px;text-align:center}
.detail .val{font-size:1.3rem;font-weight:600;margin-top:4px}
.detail .lbl{font-size:.75rem;color:#888;text-transform:uppercase;letter-spacing:1px}
#hourly{margin-top:20px;flex:1;overflow-y:auto;display:flex;gap:12px;padding:10px 0;overflow-x:auto}
#hourly::-webkit-scrollbar{height:4px}
#hourly::-webkit-scrollbar-thumb{background:#444;border-radius:4px}
.hour{flex-shrink:0;text-align:center;background:#111;border:1px solid #333;border-radius:10px;padding:10px 14px;min-width:70px}
.hour .h-time{font-size:.75rem;color:#888;margin-bottom:4px}
.hour .h-icon{font-size:1.3rem;margin-bottom:4px}
.hour .h-temp{font-size:.9rem;font-weight:600}
.error{color:#666;text-align:center;margin-top:40px}
</style>
</head>
<body>
<h2>🌤️ Wetter</h2>
<div id="main">
<div id="icon">⏳</div>
<div id="temp">--</div>
<div id="feel">--</div>
<div id="desc">Lade...</div>
<div id="loc">Deutschland</div>
</div>
<div class="details">
<div class="detail"><div class="lbl">Feuchtigkeit</div><div class="val" id="humidity">--</div></div>
<div class="detail"><div class="lbl">Wind</div><div class="val" id="wind">--</div></div>
<div class="detail"><div class="lbl">Regen</div><div class="val" id="rain">--</div></div>
<div class="detail"><div class="lbl">UV</div><div class="val" id="uv">--</div></div>
</div>
<div id="hourly"></div>
<script>
var codes={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌦️',56:'🌧️',57:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',66:'🌧️',67:'🌧️',71:'❄️',73:'❄️',75:'❄️',77:'❄️',80:'🌦️',81:'🌦️',82:'🌦️',85:'❄️',86:'❄️',95:'⛈️',96:'⛈️',99:'⛈️'};
var codeDesc={0:'Klarer Himmel',1:'Überwiegend sonnig',2:'Teilweise bewölkt',3:'Bedeckt',45:'Nebel',48:'Reifnebel',51:'Leichter Niesel',53:'Mäßiger Niesel',55:'Starker Niesel',56:'Leichter gefrierender Niesel',57:'Starker gefrierender Niesel',61:'Leichter Regen',63:'Mäßiger Regen',65:'Starker Regen',66:'Leichter gefrierender Regen',67:'Starker gefrierender Regen',71:'Leichter Schneefall',73:'Mäßiger Schneefall',75:'Starker Schneefall',77:'Schneekörner',80:'Leichte Regenschauer',81:'Mäßige Regenschauer',82:'Starke Regenschauer',85:'Leichte Schneeschauer',86:'Starke Schneeschauer',95:'Gewitter',96:'Gewitter mit leichtem Hagel',99:'Gewitter mit starkem Hagel'};

fetch('https://api.open-meteo.com/v1/forecast?latitude=51.1657&longitude=10.4515&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,precipitation,uv_index&hourly=temperature_2m,weather_code,precipitation_probability&timezone=auto&forecast_days=1').then(function(r){return r.json()}).then(function(d){
  var c=d.current;
  document.getElementById('icon').textContent=codes[c.weather_code]||'🌡️';
  document.getElementById('temp').textContent=Math.round(c.temperature_2m)+'°C';
  document.getElementById('feel').textContent='Gefühlt '+Math.round(c.apparent_temperature)+'°C';
  document.getElementById('desc').textContent=codeDesc[c.weather_code]||'';
  document.getElementById('humidity').textContent=c.relative_humidity_2m+'%';
  document.getElementById('wind').textContent=Math.round(c.wind_speed_10m)+' km/h';
  document.getElementById('rain').textContent=(c.precipitation||0)+' mm';
  document.getElementById('uv').textContent=c.uv_index||'0';

  var hEl=document.getElementById('hourly');
  if(d.hourly){
    for(var i=0;i<d.hourly.time.length;i++){
      var h=new Date(d.hourly.time[i]);
      var hh=String(h.getHours()).padStart(2,'0')+':00';
      var hTemp=Math.round(d.hourly.temperature_2m[i])+'°';
      var hIcon=codes[d.hourly.weather_code[i]]||'🌡️';
      var hRain=d.hourly.precipitation_probability[i];
      var div=document.createElement('div');div.className='hour';
      div.innerHTML='<div class="h-time">'+hh+'</div><div class="h-icon">'+hIcon+'</div><div class="h-temp">'+hTemp+'</div>'+(hRain!==undefined?'<div style="font-size:.7rem;color:#5588ff;margin-top:2px">'+hRain+'%</div>':'');
      hEl.appendChild(div);
    }
  }
}).catch(function(){document.getElementById('desc').textContent='Fehler beim Laden';});
</script>
</body>
</html>
