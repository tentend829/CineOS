<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Memory</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#fff;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;height:100vh;padding:16px;overflow:hidden;gap:10px}
h3{font-weight:300;letter-spacing:2px;color:#888}
#grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:340px;width:100%;flex:1;align-content:center}
.card{aspect-ratio:1;background:#1a1a1a;border:1px solid #333;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;transition:.2s;user-select:none}
.card.flipped{background:#2a3a2a;border-color:#4a6a4a;transform:scale(1.02)}
.card.matched{background:#1a2a1a;border-color:#3a5a3a;cursor:default;opacity:.6}
#info{display:flex;gap:20px;font-size:13px;color:#888}
#info span{color:#69db7c;font-weight:600}
#restart{padding:6px 16px;background:#333;border:1px solid #555;color:#fff;border-radius:6px;cursor:pointer;font-size:13px}
#restart:hover{background:#444}
</style></head><body>
<h3>MEMORY</h3>
<div id="info">Züge: <span id="moves">0</span> | Paare: <span id="pairs">0</span>/8</div>
<div id="grid"></div>
<button id="restart">↻ Neustart</button>
<script>
const grid=document.getElementById('grid'),movesEl=document.getElementById('moves'),pairsEl=document.getElementById('pairs');
const SYMS=['🍎','🍊','🍋','🍇','🍓','🍑','🍒','🥝'];
let cards=[],flipped=[],matched=[],moves=0,locked=false;
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function init(){grid.innerHTML='';flipped=[];matched=[];moves=0;locked=false;movesEl.textContent='0';pairsEl.textContent='0/8';
let syms=shuffle([...SYMS,...SYMS]);cards=syms;
syms.forEach((s,i)=>{let d=document.createElement('div');d.className='card';d.dataset.i=i;d.textContent='?';
d.onclick=()=>{if(locked||d.classList.contains('flipped')||d.classList.contains('matched'))return;
d.classList.add('flipped');d.textContent=s;flipped.push(i);
if(flipped.length===2){moves++;movesEl.textContent=moves;let [a,b]=flipped;
if(cards[a]===cards[b]){matched.push(a,b);pairsEl.textContent=matched.length/2+'/8';
setTimeout(()=>{document.querySelectorAll('.card.flipped:not(.matched)').forEach(c=>c.classList.add('matched'))},300);
flipped=[];if(matched.length===16)setTimeout(()=>{alert('🎉 Gewonnen!')},400)}
else{locked=true;setTimeout(()=>{document.querySelectorAll('.card.flipped:not(.matched)').forEach(c=>{c.classList.remove('flipped');c.textContent='?'});flipped=[];locked=false},800)}}});
grid.appendChild(d)})}
document.getElementById('restart').onclick=init;
init();
</script></body></html>
