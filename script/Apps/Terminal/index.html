<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Terminal</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:'Cascadia Code','Fira Code','Consolas',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#output{flex:1;overflow-y:auto;padding:12px 16px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-all}
#output .line{margin:1px 0}
#output .line.error{color:#ff6b6b}
#output .line.ok{color:#69db7c}
#output .line.info{color:#74c0fc}
#output .line.warn{color:#ffd43b}
#input-line{display:flex;align-items:center;padding:8px 16px;background:#111;border-top:1px solid #222;gap:8px;font-size:14px}
#prompt{color:#69db7c;white-space:nowrap}
#cmd{background:transparent;border:none;color:#e0e0e0;font:inherit;flex:1;outline:none;caret-color:#69db7c}
#cmd::placeholder{color:#444}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
</style></head><body>
<div id="output"><div class="line info">╔══════════════════════════════════╗</div><div class="line info">║  DanTe-OS Terminal v1.0          ║</div><div class="line info">║  Gib "help" ein für Befehle      ║</div><div class="line info">╚══════════════════════════════════╝</div></div>
<div id="input-line"><span id="prompt">dante@os:~$</span><input id="cmd" type="text" placeholder="..." autofocus spellcheck="false" autocomplete="off"></div>
<script>
const output=document.getElementById('output'),cmd=document.getElementById('cmd'),prompt=document.getElementById('prompt');
function print(t,c){let d=document.createElement('div');d.className='line'+(c?' '+c:'');d.textContent=t;output.appendChild(d);output.scrollTop=output.scrollHeight}
function run(){let v=cmd.value.trim();cmd.value='';if(!v)return;print(prompt.textContent+' '+v);let a=v.split(' '),c=a[0].toLowerCase(),args=a.slice(1);
switch(c){
case 'help':print('  Verfügbare Befehle:','ok');print('  help      – Diese Hilfe','info');print('  echo      – Text ausgeben','info');print('  clear/cls – Ausgabe leeren','info');print('  date      – Aktuelles Datum','info');print('  time      – Aktuelle Uhrzeit','info');print('  math      – Rechnung ausführen (z.B. math 2+2)','info');print('  ls        – Apps auflisten','info');print('  open      – App öffnen (z.B. open calculator)','info');print('  theme     – Theme setzen (blue,green,purple,orange,standard)','info');print('  reboot    – System neustarten','info');break;
case 'echo':print(args.join(' '));break;
case 'clear':case 'cls':output.innerHTML='';break;
case 'date':print(new Date().toLocaleDateString('de-DE',{weekday:'long',year:'numeric',month:'long',day:'numeric'}));break;
case 'time':print(new Date().toLocaleTimeString('de-DE'));break;
case 'math':try{let r=Function('"use strict";return ('+args.join(' ')+')')();print('= '+r)}catch(e){print('Fehler: '+e.message,'error')}break;
case 'ls':try{let apps=Object.keys(window.parent.APPS||{}).join(', ');print(apps||'Keine Apps gefunden.')}catch(e){print('Konnte Apps nicht lesen.','error')}break;
case 'open':if(args.length){try{let id=args[0].toLowerCase();if(window.parent.APPS&&window.parent.APPS[id]){window.parent.toggleApp(id);print('Öffne '+id+'...','ok')}else{print('App "'+id+'" nicht gefunden.','error')}}catch(e){print('Fehler: '+e.message,'error')}}else print('Verwendung: open &lt;app-id&gt;','warn');break;
case 'theme':if(args.length){let t=args[0].toLowerCase();try{window.parent.applyTheme(t);print('Theme auf "'+t+'" gesetzt.','ok')}catch(e){print('Fehler: Theme nicht verfügbar.','error')}}else print('Verwendung: theme &lt;name&gt;','warn');break;
case 'reboot':try{window.parent.boot()||location.reload()}catch(e){location.reload()}break;
default:print('Unbekannter Befehl: '+c+' — Gib "help" ein.','error')
}}
cmd.addEventListener('keydown',function(e){if(e.key==='Enter')run()});
setInterval(function(){prompt.style.opacity=prompt.style.opacity==='1'?'.5':'1'},600);
</script></body></html>
