<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Kalender</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#fff;font-family:'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column;padding:16px;overflow:hidden}
#header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
#header h2{font-weight:300;letter-spacing:1px}
#header button{padding:6px 14px;background:#333;border:1px solid #555;color:#fff;border-radius:6px;cursor:pointer;font-size:14px}
#header button:hover{background:#444}
#header span{display:flex;gap:8px}
#weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px;text-align:center;color:#666;font-size:12px;font-weight:600;text-transform:uppercase}
#days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;flex:1;align-content:start}
.day{padding:8px;border-radius:8px;text-align:center;cursor:pointer;font-size:14px;min-height:56px;position:relative;background:#1a1a1a;border:1px solid #222;transition:.15s}
.day:hover{background:#333}
.day.other{opacity:.25}
.day.today{background:#2a4a2a;border-color:#4a8a4a;font-weight:600}
.day .dot{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:#69db7c}
#events-panel{background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:12px;margin-top:12px;display:none}
#events-panel h4{margin-bottom:8px;color:#888}
#events-panel input{padding:6px 10px;background:#222;border:1px solid #444;color:#fff;border-radius:6px;width:200px;font-size:13px}
#events-panel button{padding:6px 14px;background:#333;border:1px solid #555;color:#fff;border-radius:6px;cursor:pointer;font-size:13px}
#events-panel button:hover{background:#444}
#events-panel .ev{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #222;font-size:13px;color:#ccc}
#events-panel .ev button{background:none;border:none;color:#666;cursor:pointer;padding:2px 6px;font-size:14px}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
</style></head><body>
<div id="header"><button id="prev">◀</button><h2 id="month-year"></h2><span><button id="today">Heute</button><button id="next">▶</button></span></div>
<div id="weekdays"><span>Mo</span><span>Di</span><span>Mi</span><span>Do</span><span>Fr</span><span>Sa</span><span>So</span></div>
<div id="days"></div>
<div id="events-panel"><h4 id="ep-title"></h4><div id="ep-list"></div><div style="display:flex;gap:6px;margin-top:8px"><input id="ep-input" placeholder="Termin..."><button id="ep-add">Hinzufügen</button><button id="ep-close">Schließen</button></div></div>
<script>
let date=new Date(),events=JSON.parse(localStorage.getItem('calendar_events')||'[]'),selected=null;
function save(){localStorage.setItem('calendar_events',JSON.stringify(events))}
function render(){let y=date.getFullYear(),m=date.getMonth();
document.getElementById('month-year').textContent=new Date(y,m).toLocaleDateString('de-DE',{month:'long',year:'numeric'});
let grid=document.getElementById('days');grid.innerHTML='';
let fd=new Date(y,m,1).getDay();fd=fd===0?6:fd-1;
let ld=new Date(y,m+1,0).getDate();
let pd=new Date(y,m,0).getDate();
let today=new Date();today=new Date(today.getFullYear(),today.getDate(),today.getMonth());
for(let i=fd-1;i>=0;i--){let d=document.createElement('div');d.className='day other';d.textContent=pd-i;grid.appendChild(d)}
for(let i=1;i<=ld;i++){let d=document.createElement('div');d.className='day';let key=y+'-'+m+'-'+i;
if(y===today.getFullYear()&&m===today.getMonth()&&i===today.getDate())d.classList.add('today');
if(events.some(e=>e.date===key)){let dot=document.createElement('div');dot.className='dot';d.appendChild(dot)}
d.textContent=i;d.dataset.date=key;
d.onclick=()=>{selected=key;let ep=document.getElementById('events-panel');
document.getElementById('ep-title').textContent='Termine am '+i+'.'+(m+1)+'.'+y;
let list=document.getElementById('ep-list');list.innerHTML='';
let evs=events.filter(e=>e.date===key);
if(!evs.length)list.innerHTML='<div style="color:#555;font-size:13px">Keine Termine</div>';
evs.forEach((e,idx)=>{let r=document.createElement('div');r.className='ev';
let idx2=events.indexOf(e);
r.innerHTML='<span>• '+e.text+'</span><button data-idx="'+idx2+'">✕</button>';
r.querySelector('button').onclick=function(){let i2=parseInt(this.dataset.idx);events.splice(i2,1);save();render();this.closest('#events-panel')&&this.closest('#events-panel').querySelector('.day')&&this.closest('#events-panel').querySelector('.day').click()};
list.appendChild(r)});
ep.style.display='block'};
grid.appendChild(d)}
let rem=7-(fd+ld)%7;if(rem<7)for(let i=1;i<=rem;i++){let d=document.createElement('div');d.className='day other';d.textContent=i;grid.appendChild(d)}
document.getElementById('ep-add').onclick=()=>{let inp=document.getElementById('ep-input');let t=inp.value.trim();if(!t||!selected)return;events.push({date:selected,text:t});save();render();inp.value='';if(document.querySelector('.day[data-date="'+selected+'"]'))document.querySelector('.day[data-date="'+selected+'"]').click()};
document.getElementById('ep-close').onclick=()=>{document.getElementById('events-panel').style.display='none'}}
document.getElementById('prev').onclick=()=>{date.setMonth(date.getMonth()-1);render()}
document.getElementById('next').onclick=()=>{date.setMonth(date.getMonth()+1);render()}
document.getElementById('today').onclick=()=>{date=new Date();render()}
render();
</script></body></html>
