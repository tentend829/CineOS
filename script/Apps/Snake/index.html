<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Segoe UI',sans-serif;height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{text-align:center}
#score{font-size:1.2rem;color:#888;margin-bottom:12px;letter-spacing:2px}
canvas{border:1px solid #333;border-radius:12px;background:#0a0a0a;display:block;margin:0 auto}
#over{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.9);padding:30px 40px;border:1px solid #333;border-radius:16px;display:none}
#over h2{color:#fff;margin-bottom:8px}
#over p{color:#888;margin-bottom:16px}
#over button{background:#fff;color:#000;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-weight:700}
.rel{position:relative;display:inline-block}
</style>
</head>
<body>
<div class="wrap">
<div id="score">0</div>
<div class="rel">
<canvas id="gc" width="400" height="400"></canvas>
<div id="over">
<h2>Game Over</h2>
<p id="fs">Score: 0</p>
<button onclick="reset()">Nochmal</button>
</div>
</div>
</div>
<script>
var c=document.getElementById('gc'),ctx=c.getContext('2d');
var gs=20,tc=20,dx=1,dy=0,apple={x:10,y:10},snake=[{x:5,y:10},{x:4,y:10},{x:3,y:10}],score=0,run=true;

function rand(){return{x:Math.floor(Math.random()*tc),y:Math.floor(Math.random()*tc)}}

function move(){
  if(!run)return;
  var h=snake[0],nx=h.x+dx,ny=h.y+dy;
  if(nx<0||nx>=tc||ny<0||ny>=tc||snake.some(function(s){return s.x===nx&&s.y===ny})){run=false;document.getElementById('over').style.display='block';document.getElementById('fs').textContent='Score: '+score;return}
  snake.unshift({x:nx,y:ny});
  if(nx===apple.x&&ny===apple.y){score++;document.getElementById('score').textContent=score;do{apple=rand()}while(snake.some(function(s){return s.x===apple.x&&s.y===apple.y}))}
  else snake.pop();
  draw();
}

function draw(){
  ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,400,400);
  ctx.fillStyle='#ff8c00';ctx.shadowBlur=10;ctx.shadowColor='#ff8c00';
  snake.forEach(function(s,i){ctx.fillRect(s.x*gs+1,s.y*gs+1,gs-2,gs-2);if(i===0){ctx.fillStyle='#ffa500'}});
  ctx.shadowBlur=0;ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(apple.x*gs+gs/2,apple.y*gs+gs/2,gs/2-3,0,Math.PI*2);ctx.fill();
}

document.addEventListener('keydown',function(e){
  if(!run)return;
  if((e.key==='ArrowUp'||e.key==='w')&&dy!==1){dx=0;dy=-1}
  else if((e.key==='ArrowDown'||e.key==='s')&&dy!==-1){dx=0;dy=1}
  else if((e.key==='ArrowLeft'||e.key==='a')&&dx!==1){dx=-1;dy=0}
  else if((e.key==='ArrowRight'||e.key==='d')&&dx!==-1){dx=1;dy=0}
});

function reset(){
  snake=[{x:5,y:10},{x:4,y:10},{x:3,y:10}];dx=1;dy=0;score=0;run=true;
  document.getElementById('score').textContent='0';document.getElementById('over').style.display='none';
  apple=rand();draw();
}

setInterval(move,100);
draw();
</script>
</body>
</html>
