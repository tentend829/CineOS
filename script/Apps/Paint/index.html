<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Paint</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#fff;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden}
#toolbar{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#1a1a1a;border-bottom:1px solid #333;flex-wrap:wrap}
#toolbar label{color:#888;font-size:12px;display:flex;align-items:center;gap:4px}
#toolbar input[type=color]{width:32px;height:32px;border:none;background:transparent;cursor:pointer}
#toolbar input[type=range]{width:80px;cursor:pointer}
#toolbar button{padding:4px 12px;background:#333;border:1px solid #555;color:#fff;border-radius:4px;cursor:pointer;font-size:12px}
#toolbar button:hover{background:#444}
canvas{flex:1;cursor:crosshair;touch-action:none}
.clear-btn{background:#5a1a1a!important;border-color:#a33!important}
.clear-btn:hover{background:#7a2a2a!important}
</style></head><body>
<div id="toolbar">
<label>🎨<input type="color" id="color" value="#ffffff"></label>
<label>Size<input type="range" id="size" min="1" max="30" value="4"></label>
<button id="undo">↩ Undo</button>
<button id="clear" class="clear-btn">🗑 Clear</button>
<button id="save">💾 Save</button>
</div>
<canvas id="canvas"></canvas>
<script>
const c=document.getElementById('canvas'),ctx=c.getContext('2d');
let drawing=false,paths=[],currentPath=[],redoStack=[];
function resize(){c.width=c.clientWidth;c.height=c.clientHeight;redraw()}
function redraw(){ctx.clearRect(0,0,c.width,c.height);paths.forEach(p=>{if(p.length){ctx.beginPath();ctx.strokeStyle=p[0].color;ctx.lineWidth=p[0].size;ctx.lineCap='round';ctx.lineJoin='round';ctx.moveTo(p[0].x,p[0].y);for(let i=1;i<p.length;i++){ctx.lineTo(p[i].x,p[i].y)}ctx.stroke()}})}
function getPos(e){let r=c.getBoundingClientRect();let t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}
c.addEventListener('mousedown',e=>{drawing=true;currentPath=[{...getPos(e),color:document.getElementById('color').value,size:document.getElementById('size').value}]});
c.addEventListener('mousemove',e=>{if(!drawing)return;currentPath.push(getPos(e));ctx.beginPath();let p=currentPath;ctx.strokeStyle=p[0].color;ctx.lineWidth=p[0].size;ctx.lineCap='round';ctx.lineJoin='round';ctx.moveTo(p[p.length-2].x,p[p.length-2].y);ctx.lineTo(p[p.length-1].x,p[p.length-1].y);ctx.stroke()});
c.addEventListener('mouseup',()=>{if(drawing){drawing=false;if(currentPath.length){paths.push(currentPath);redoStack=[]}currentPath=[]}});
c.addEventListener('mouseleave',()=>{if(drawing){drawing=false;if(currentPath.length){paths.push(currentPath);redoStack=[]}currentPath=[]}});
c.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;currentPath=[{...getPos(e),color:document.getElementById('color').value,size:document.getElementById('size').value}]});
c.addEventListener('touchmove',e=>{e.preventDefault();if(!drawing)return;currentPath.push(getPos(e));ctx.beginPath();let p=currentPath;ctx.strokeStyle=p[0].color;ctx.lineWidth=p[0].size;ctx.lineCap='round';ctx.lineJoin='round';ctx.moveTo(p[p.length-2].x,p[p.length-2].y);ctx.lineTo(p[p.length-1].x,p[p.length-1].y);ctx.stroke()});
c.addEventListener('touchend',e=>{e.preventDefault();if(drawing){drawing=false;if(currentPath.length){paths.push(currentPath);redoStack=[]}currentPath=[]}});
document.getElementById('undo').onclick=()=>{if(paths.length){redoStack.push(paths.pop());redraw()}};
document.getElementById('clear').onclick=()=>{if(paths.length){redoStack.push(...paths);paths=[];redraw()}};
document.getElementById('save').onclick=()=>{let a=document.createElement('a');a.download='drawing.png';a.href=c.toDataURL();a.click()};
window.addEventListener('resize',resize);resize();
</script></body></html>
