<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Segoe UI',sans-serif;height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{text-align:center;width:100%;max-width:420px;padding:20px}
h2{font-size:1rem;color:#888;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px}
#disp{font-size:4.5rem;font-weight:300;letter-spacing:4px;font-family:monospace;font-variant-numeric:tabular-nums;margin-bottom:20px}
.inps{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.inps input{background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:12px;color:#fff;font-size:1.5rem;text-align:center;outline:none;font-family:monospace}
.inps input:focus{border-color:#888}
.inps label{font-size:.75rem;color:#888;margin-top:4px;display:block}
.btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
button{padding:12px 28px;font-size:1rem;border:1px solid #333;border-radius:10px;background:#111;color:#fff;cursor:pointer;transition:.15s;font-weight:600}
button:hover{background:#222;border-color:#fff}
.start{background:#ff8c00;color:#000;border-color:#ff8c00}
.start:hover{background:#ffa500}
#label{font-size:.9rem;color:#555;margin-top:16px;min-height:24px}
input[type="text"]{background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:12px;color:#fff;font-size:14px;text-align:center;outline:none;width:100%;font-family:inherit;margin-bottom:16px}
input[type="text"]:focus{border-color:#888}
</style>
</head>
<body>
<div class="wrap">
<h2>⏳ Countdown</h2>
<input id="evt" type="text" placeholder="Event-Name (optional)" maxlength="40">
<div class="inps">
<div><input id="d" type="number" min="0" value="0"><label>Tage</label></div>
<div><input id="h" type="number" min="0" max="23" value="0"><label>Stunden</label></div>
<div><input id="m" type="number" min="0" max="59" value="5"><label>Minuten</label></div>
<div><input id="s" type="number" min="0" max="59" value="0"><label>Sekunden</label></div>
</div>
<div id="disp">00:05:00</div>
<div id="label"></div>
<div class="btns">
<button id="btn-start" class="start" onclick="toggle()">Start</button>
<button onclick="reset()">Reset</button>
</div>
</div>
<script>
var sec=300,total=300,run=false,iv=null;

function fmt(s){
  var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),se=s%60;
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(se).padStart(2,'0');
}

function up(){document.getElementById('disp').textContent=fmt(sec)}

function setFromInputs(){
  var d=parseInt(document.getElementById('d').value)||0;
  var h=parseInt(document.getElementById('h').value)||0;
  var m=parseInt(document.getElementById('m').value)||0;
  var se=parseInt(document.getElementById('s').value)||0;
  sec=d*86400+h*3600+m*60+se;total=sec;up();
}

function toggle(){
  if(run){clearInterval(iv);run=false;document.getElementById('btn-start').textContent='Weiter';document.getElementById('btn-start').className='start';document.getElementById('label').textContent='Pausiert';return}
  if(sec<=0)return;
  run=true;document.getElementById('btn-start').textContent='Pause';document.getElementById('btn-start').className='';
  document.getElementById('label').textContent='Läuft...';
  iv=setInterval(function(){
    sec--;
    if(sec<=0){clearInterval(iv);run=false;document.getElementById('btn-start').textContent='Start';document.getElementById('btn-start').className='start';document.getElementById('label').textContent='⏰ Zeit abgelaufen!';try{new Notification('Countdown',{body:document.getElementById('evt').value||'Countdown abgelaufen!'})}catch(e){}}
    up();
  },1000);
}

function reset(){
  clearInterval(iv);run=false;document.getElementById('btn-start').textContent='Start';document.getElementById('btn-start').className='start';document.getElementById('label').textContent='';setFromInputs();
}

document.querySelectorAll('.inps input').forEach(function(el){el.addEventListener('change',function(){if(!run)setFromInputs()})});
Notification.requestPermission();
</script>
</body>
</html>
