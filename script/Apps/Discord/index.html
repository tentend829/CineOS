<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Discord Chat</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#09090b;color:#fff;font-family:'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#111;border-bottom:1px solid #222}
#header img{width:28px;height:28px;border-radius:50%}
#header h3{font-size:14px;font-weight:600;flex:1}
#header span{font-size:11px;color:#5865f2;background:rgba(88,101,242,0.15);padding:2px 10px;border-radius:10px}
#chat{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.msg{display:flex;gap:10px;align-items:flex-start;max-width:85%}
.msg.self{margin-left:auto;flex-direction:row-reverse}
.msg .avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:#5865f2;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
.msg .bubble{background:#1e1e22;border-radius:12px;padding:8px 12px;font-size:13px;line-height:1.5;word-break:break-word}
.msg.self .bubble{background:#2b2d5e}
.msg .bubble .name{font-size:11px;color:#5865f2;font-weight:600;margin-bottom:2px}
.msg .bubble .time{font-size:10px;color:#555;margin-top:4px;text-align:right}
#input-area{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#111;border-top:1px solid #222}
#input-area input{flex:1;padding:8px 14px;background:#1e1e22;border:1px solid #333;border-radius:8px;color:#fff;font-size:13px;outline:none}
#input-area input:focus{border-color:#5865f2}
#input-area button{padding:8px 16px;background:#5865f2;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:13px;font-weight:600}
#input-area button:hover{background:#4752c4}
#widget-area{border-top:1px solid #222;height:120px;overflow:hidden;background:#0a0a0c}
#widget-area iframe{width:100%;height:100%;border:none;opacity:.7}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
</style></head><body>
<div id="header"><img src="https://assets-global.website-files.com/6257adef93867e50d84d30e2/636e0a6a49cf127bf92de1e2_icon_clyde_blurple_RGB.png" alt=""><h3>DanTe-OS Community</h3><span>● 42 Online</span></div>
<div id="chat"></div>
<div id="input-area"><input id="msg-input" placeholder="Nachricht an #general..."><button id="send-btn">Senden</button></div>
<div id="widget-area"><iframe src="https://discord.com/widget?id=123456789012345678&theme=dark" allowtransparency="true" sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts"></iframe></div>
<script>
const chat=document.getElementById('chat'),inp=document.getElementById('msg-input'),btn=document.getElementById('send-btn');
const USERS=[{name:'DanTe',color:'#5865f2'},{name:'Ciri',color:'#ed64a6'},{name:'Xeno',color:'#f6c23e'},{name:'PixelBot',color:'#48bb78'}];
let msgs=JSON.parse(localStorage.getItem('discord_msgs')||'[]');
function save(){localStorage.setItem('discord_msgs',JSON.stringify(msgs))}
function addMsg(name,text,color){msgs.push({name,text,color,time:Date.now()});save();render()}
function render(){chat.innerHTML='';msgs.forEach(m=>{
let d=document.createElement('div');d.className='msg';
d.innerHTML='<div class="avatar" style="background:'+m.color+'">'+m.name[0]+'</div><div class="bubble"><div class="name">'+m.name+'</div>'+m.text+'<div class="time">'+new Date(m.time).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})+'</div></div>';
chat.appendChild(d)});chat.scrollTop=chat.scrollHeight}
btn.onclick=function(){let t=inp.value.trim();if(!t)return;addMsg('DanTe',t,'#5865f2');inp.value=''};
inp.addEventListener('keydown',e=>{if(e.key==='Enter')btn.click()});
// Simulate other users
setInterval(function(){if(Math.random()>.7){let u=USERS[Math.floor(Math.random()*USERS.length)];
let msgs2=['Hallo zusammen!','Was geht?','Nice!','👍','Lol','Checkt das mal aus','Gute Musik läuft heute',': )'];addMsg(u.name,msgs2[Math.floor(Math.random()*msgs2.length)],u.color)}},15000);
render();
</script></body></html>
