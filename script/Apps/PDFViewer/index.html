<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>PDF Viewer</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#fff;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden}
#bar{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#1a1a1a;border-bottom:1px solid #333;flex-wrap:wrap}
#bar input{flex:1;padding:6px 10px;background:#222;border:1px solid #444;color:#fff;border-radius:6px;font-size:13px;min-width:150px}
#bar button{padding:6px 14px;background:#333;border:1px solid #555;color:#fff;border-radius:6px;cursor:pointer;font-size:13px}
#bar button:hover{background:#444}
#bar button:disabled{opacity:.3;cursor:default}
#bar span{color:#888;font-size:13px}
#viewer{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;overflow:auto}
#viewer iframe{width:100%;height:100%;border:none;border-radius:6px}
.hint{color:#555;text-align:center;font-size:14px;line-height:1.8}
#page-info{margin-left:auto;color:#666;font-size:12px}
</style></head><body>
<div id="bar">
<span>📄</span>
<input id="url" placeholder="PDF-URL eingeben... (z.B. https://example.com/doc.pdf)">
<button id="load">Laden</button>
<button id="prev" disabled>◀</button>
<span id="page-info">Seite 1/1</span>
<button id="next" disabled>▶</button>
<button id="file-btn">📁 Datei öffnen</button>
<input type="file" id="file" accept=".pdf" style="display:none">
</div>
<div id="viewer"><div class="hint">PDF-URL eingeben oder<br>eine PDF-Datei auswählen</div></div>
<script>
const viewer=document.getElementById('viewer'),urlInp=document.getElementById('url'),loadBtn=document.getElementById('load');
const prevBtn=document.getElementById('prev'),nextBtn=document.getElementById('next'),pageInfo=document.getElementById('page-info');
const fileBtn=document.getElementById('file-btn'),fileInp=document.getElementById('file');
let currentUrl='',page=1,totalPages=1;
function loadPdf(url){if(!url)return;url=url.trim();if(!url)return;
viewer.innerHTML='<iframe src="https://docs.google.com/gview?url='+encodeURIComponent(url)+'&embedded=true"></iframe>';
currentUrl=url;page=1;totalPages=1;pageInfo.textContent='Seite 1/1';prevBtn.disabled=true;nextBtn.disabled=true}
loadBtn.onclick=()=>loadPdf(urlInp.value);
urlInp.addEventListener('keydown',e=>{if(e.key==='Enter')loadPdf(urlInp.value)});
fileBtn.onclick=()=>fileInp.click();
fileInp.onchange=()=>{let f=fileInp.files[0];if(!f)return;let u=URL.createObjectURL(f);urlInp.value=f.name;loadPdf(u)};
</script></body></html>
