<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV-Streams</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { height: 100vh; width: 100vw; overflow: hidden; background: #000; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; }
    iframe { width: 100%; height: 100%; border: none; display: none; }
    #nav {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; background: rgba(0,0,0,.85);
      border-bottom: 1px solid #333; backdrop-filter: blur(8px);
      position: relative; z-index: 99;
    }
    #nav button {
      background: #222; border: 1px solid #444; color: #fff;
      padding: 6px 14px; border-radius: 8px; cursor: pointer;
      font-size: 13px; transition: .2s; white-space: nowrap;
    }
    #nav button:hover { background: #fff; color: #000; border-color: #fff; }
    #nav button.active { background: #fff; color: #000; border-color: #fff; }
    #url-bar {
      flex: 1; background: #1a1a1a; border: 1px solid #444; border-radius: 8px;
      color: #fff; padding: 7px 12px; font-size: 13px; outline: none;
      display: none;
    }
    #url-bar:focus { border-color: #888; }
    #sel {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 40px;
    }
    h1 { font-size: 1.6rem; letter-spacing: 4px; opacity: .5; font-weight: 300; text-transform: uppercase; }
    .row { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; }
    .card {
      background: #111; border: 1px solid #333; border-radius: 18px;
      padding: 40px 50px; cursor: pointer; transition: .25s ease;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      min-width: 200px;
    }
    .card:hover { border-color: #fff; transform: translateY(-6px); background: #1a1a1a; }
    .card img { width: 64px; height: 64px; object-fit: contain; }
    .card span { font-size: 1.1rem; font-weight: 600; }
    .card small { font-size: .8rem; color: #888; }
  </style>
</head>
<body>
  <div id="sel">
    <h1>TV-Streams</h1>
    <div class="row">
      <div class="card" onclick="openYouTube()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/09/YouTube_full-color_icon_%282017%29.svg/1200px-YouTube_full-color_icon_%282017%29.svg.png" alt="YouTube">
        <span>YouTube</span>
        <small>Videos & Musik</small>
      </div>
      <div class="card" onclick="openBrowser()">
        <img src="https://cdn-icons-png.flaticon.com/512/1006/1006771.png" alt="Browser">
        <span>Browser</span>
        <small>Proxy / Web</small>
      </div>
    </div>
  </div>

  <nav id="nav" style="display:none">
    <button onclick="back()">←</button>
    <button id="btn-yt" onclick="switchTo('yt')" class="active">YouTube</button>
    <button id="btn-br" onclick="switchTo('br')">Browser</button>
    <input id="url-bar" type="text" placeholder="URL eingeben..." onkeydown="if(event.key==='Enter')navigate()">
    <button id="go-btn" style="display:none" onclick="navigate()">Go</button>
  </nav>

  <div id="yt-wrap" style="display:none;width:100%;height:calc(100% - 49px)">
    <iframe id="yt-ifr" allowfullscreen allow="autoplay; fullscreen" style="display:block"></iframe>
  </div>
  <iframe id="br-ifr" allowfullscreen allow="autoplay; fullscreen; gamepad; microphone; camera"></iframe>

  <script>
    var mode = 'yt';

    function openYouTube() {
      document.getElementById('sel').style.display = 'none';
      document.getElementById('nav').style.display = 'flex';
      switchTo('yt');
    }

    function openBrowser() {
      document.getElementById('sel').style.display = 'none';
      document.getElementById('nav').style.display = 'flex';
      switchTo('br');
    }

    function switchTo(m) {
      mode = m;
      document.getElementById('btn-yt').className = m === 'yt' ? 'active' : '';
      document.getElementById('btn-br').className = m === 'br' ? 'active' : '';
      document.getElementById('url-bar').style.display = m === 'br' ? 'block' : 'none';
      document.getElementById('go-btn').style.display = m === 'br' ? 'block' : 'none';
      document.getElementById('yt-wrap').style.display = m === 'yt' ? 'block' : 'none';
      document.getElementById('br-ifr').style.display = m === 'br' ? 'block' : 'none';

      if (m === 'yt' && !document.getElementById('yt-ifr').src) {
        document.getElementById('yt-ifr').src = 'https://www.youtube.com/embed?autoplay=0';
      }
    }

    function navigate() {
      var val = document.getElementById('url-bar').value.trim();
      if (!val) return;
      if (!/^https?:\/\//i.test(val)) val = 'https://' + val;
      document.getElementById('br-ifr').src = val;
    }

    function back() {
      document.getElementById('sel').style.display = 'flex';
      document.getElementById('nav').style.display = 'none';
      document.getElementById('yt-wrap').style.display = 'none';
      document.getElementById('br-ifr').style.display = 'none';
      document.getElementById('br-ifr').src = '';
      document.getElementById('url-bar').value = '';
    }
  </script>
</body>
</html>
